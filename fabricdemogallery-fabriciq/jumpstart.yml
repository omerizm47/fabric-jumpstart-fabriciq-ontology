# Production Jumpstart registry entry (DRAFT) for the FabricIQ Ontology pilot.
# This is the file that will go in fabric-jumpstart/.../jumpstarts/core|community/fabricdemogallery-fabriciq.yml
# once the content repo below is built, tagged, and the SVGs are generated.
#
# NOTE: `source.repo_url`/`repo_ref` are placeholders until we create + tag the
# real content repo. `mermaid_diagram` is included to lock the shape, but the
# validator (test_registry) requires committed light/dark SVGs in
# assets/images/diagrams/ before this can be added to the live registry — generate
# them via the web app's /tools/diagram-generator page.
id: 27
logical_id: fabricdemogallery-fabriciq
name: FabricIQ Ontology and Data Agent
description: >-
  Build a semantic ontology over a Lakehouse (business entities) and an
  Eventhouse (time-series), bind it to real tables, and expose it through a
  Fabric Data Agent for natural-language, context-aware analytics.
date_added: 07/01/2026
workload_tags:
  - Ontology
  - Real-Time Intelligence
  - Data Science
scenario_tags:
  - Modeling
type: Demo
source:
  # DECISION: real content repo URL + tag (created + tagged during the live build).
  # STANDARD: complex jumpstarts should live in an ISOLATED repo, hence a dedicated
  # repo name here rather than the shared gallery repo.
  repo_url: https://github.com/omerizm47/fabric-jumpstart-fabriciq-ontology.git
  repo_ref: v0.1.15
  workspace_path: fabricdemogallery-fabriciq/
# The notebooks self-fetch the accelerator wheel + ontology .iq from this repo's
# data/ folder at runtime, so no files_source_path upload is needed.
# fabric-cicd deploys ONLY the Lakehouse, Eventhouse, and the notebooks. The
# Ontology item + the two Data Agents are CREATED AT RUNTIME by 02_create_ontology,
# so they are intentionally NOT listed here (items_in_scope = deployed types only).
items_in_scope:
  - Lakehouse
  - Eventhouse
  - KQLDatabase
  - Notebook
entry_point: GettingStarted.Notebook
# DECISION: for a CORE jumpstart this must be a mail-enabled SECURITY GROUP with
# >=2 owners (e.g. fabricjumpstart.fabricdemogallery-fabriciq@microsoft.com), not a personal
# email. Finalize once core-vs-community + the Microsoft sponsor are confirmed.
owner_email: omerguzel@microsoft.com
difficulty: Advanced
minutes_to_deploy: 5
minutes_to_complete_jumpstart: 25
mermaid_diagram: |
  graph LR
    DATA[Industry data]:::U1F4E6 --> NB1[01_generate_ontology_data]:::Notebook
    NB1 --> LH[fabriciq_lakehouse]:::Lakehouse
    NB1 --> EH[fabriciq_eventhouse]:::Eventhouse
    LH --> NB2[02_create_ontology]:::Notebook
    EH --> NB2
    NB2 --> ONT[FabricIqOntology]:::Ontology
    ONT --> OAG[Ontology Data Agent]:::DataAgent
    LH -.-> DAG[Direct Data Agent]:::DataAgent
    EH -.-> DAG
